tutorial.leaf = "Клетка которая генерирует  энергию. Эффективность зависит от настроек субстрата."
tutorial.fat = "Клетка которая копит энергию. Емкость зависит от настроек субстрата."
tutorial.bone = "Очень жесткая клетка, её невозможно сжать, невозможно уничтожить с помощью punisher, отлично подходит для создания защитного слоя."
tutorial.tail = "Жгутик, при подаче нейро-импульса больше 0 начинает движение в сторону которую он смотрит. Скорость регулируется диапазоном от 0 до 1. Эффективность зависит от настроек субстрата."
tutorial.neuron = "Нейронная клетка, способна выполнять математические операции с входящими сигналами. Принимает все входящие сигналы и в зависимости от режима суммирует либо перемножает их получая X. После чего применяется математическая формула и нейрон выдает сигнал Y"
tutorial.muscle = "Клетка которая при подаче нейроимпульса сжимается или разжимается(точно не помню на какие сигналы реагирует, потом написать :) )"
tutorial.sensor = "Клетка которая выдает различный нейроимпульс в зависимости от расстояния до ближайшей еды в её радиусе действия."
tutorial.sucker = "Клетка которая при соприкосновении с едой поглощает её."
tutorial.accelerationSensor = "Клетка которая выдает нейро-импульс в зависимости от ускорения."
tutorial.excreta = "Клетка которая при наличии энергии выделяет еду в направлении своего взгляда."
tutorial.sticky = "Клетка-липучка. При соприкосновении с другой клеткой, стеной или едой прикрепляется к ней, при подаче нейро-импульса <0 отцепляется"
tutorial.skinCell = "Клетка-присоска. При подаче нейро-импульса >0 прицепляется к субстрату(тяжело сдвинуть) при подаче нейро-импульса <0 отцепляется"
tutorial.pumper = "Клетка которая при соприкосновении с другой клеткой высасывает питательные вещества из неё."
tutorial.chameleon = "Клетка которая может менять цвет в зависимости от нейро-импульса. r-красный, g-зеленый. b-синий"
tutorial.eye = "Клетка которая пускает прямой луч в направлении своего взгляда и выдает нейро-импульс в зависимости от расстояния до ближайшего объекта(1-очень близко, 0-ничего нет)"
tutorial.compass = "Клетка которая выдает нейромпульс в зависимости от направления своего взгляда(север-юг)"
tutorial.controller = "Клетка которая выдает нейро-импульс в зависимости от нажатой клетки на клавиатуре(0-10). Работает только на ПК"
tutorial.touchTrigger = "Клетка которая генерирует нейроимпульс в зависимости от давления на неё."
tutorial.zygote = "Клетка которая при наличии энергии превращается в зародыш и создает новый организм."
tutorial.producer = "Клетка которая при наличии энергии и нейро-импульса выстреливает зиготой в направлении своего взгляда"
tutorial.breakAway = "Клетка которая при наличии нейро-импульса убивает себя, разрушая все физические связи, и оставляя на своем месте еду."
tutorial.vascular = "Клетка которая перемещает питательные вещества в определенном направлении."
tutorial.pheromoneEmitter = "Клетка которая при наличии нейро-импульса выделяет в окружающую среду феромоны."
tutorial.pheromoneSensor = "Клетка которая выделяет нейро-импульс в зависимости от концентрации феромонов."
tutorial.punisher = "Клетка которая при контакте с другой клеткой убивает её превращая в еду. Не работает для Bone."
